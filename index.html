<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Bat Tracker">
<meta name="theme-color" content="#0b0b12">
<meta name="description" content="Statcast bat speed leaderboard with 7-day HR tracker">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<title>Bat Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #0b0b12;
  --surf:    #13131e;
  --surf2:   #0f0f18;
  --border:  rgba(255,255,255,0.06);
  --border2: rgba(255,255,255,0.10);
  --text:    #e2e8f0;
  --muted:   #475569;
  --dim:     #1e293b;
  --slate:   #94a3b8;
  --blue:    #3b82f6;
  --blue2:   #60a5fa;
  --green:   #22c55e;
  --red:     #ef4444;
  --red2:    #fca5a5;
  --amber:   #f59e0b;
  --purple:  #a78bfa;
  --font:    'Rajdhani', sans-serif;
  --mono:    'IBM Plex Mono', monospace;
  --st:      env(safe-area-inset-top,0px);
  --sb:      env(safe-area-inset-bottom,0px);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100dvh;-webkit-font-smoothing:antialiased;overscroll-behavior:none}
#app{max-width:430px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column}

/* HEADER */
header{padding:calc(var(--st) + 14px) 18px 12px;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0;position:sticky;top:0;z-index:50}
.hdr-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.brand{display:flex;align-items:center;gap:9px}
.brand-mark{width:30px;height:30px;background:var(--blue);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.brand-name{font-size:22px;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;color:var(--text);line-height:1}
.brand-name em{color:var(--blue2);font-style:normal}
.icon-btn{width:32px;height:32px;background:var(--surf);border:1px solid var(--border2);border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);font-size:15px;-webkit-tap-highlight-color:transparent;transition:background .15s}
.icon-btn:active{background:var(--dim)}
.spin{animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.date-row{display:flex;align-items:center;gap:6px}
.date-pill{background:var(--surf2);border:1px solid var(--border);border-radius:7px;padding:5px 10px;font-family:var(--mono);font-size:12px;color:var(--slate);display:flex;align-items:center;gap:5px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.date-pill i{font-size:13px}
.date-sep{color:var(--dim);font-size:11px}
.window-chip{margin-left:auto;background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.2);border-radius:6px;padding:4px 9px;font-family:var(--mono);font-size:11px;color:var(--blue2)}
.date-inputs{display:none;gap:6px;align-items:center}
.date-inputs.vis{display:flex}
.date-inputs input[type=date]{background:var(--surf2);border:1px solid var(--border2);border-radius:7px;color:var(--text);font-family:var(--mono);font-size:12px;padding:5px 8px;outline:none}
.date-inputs input[type=date]:focus{border-color:var(--blue)}

/* FILTER TOGGLE */
.filter-toggle{display:flex;align-items:center;justify-content:space-between;padding:9px 18px;background:var(--surf2);border-bottom:1px solid var(--border);cursor:pointer;-webkit-tap-highlight-color:transparent;flex-shrink:0}
.ftl{display:flex;align-items:center;gap:7px;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.ftl i{color:var(--blue);font-size:14px}
.active-chip{background:rgba(59,130,246,.12);color:var(--blue2);font-family:var(--mono);font-size:10px;padding:2px 7px;border-radius:4px;display:none}
.active-chip.show{display:inline}
.fchev{color:var(--muted);font-size:14px;transition:transform .2s}
.fchev.open{transform:rotate(180deg)}

/* FILTER PANEL */
.filter-panel{background:var(--surf2);border-bottom:1px solid var(--border);padding:12px 18px 14px;display:none;flex-shrink:0}
.filter-panel.open{display:block}
.filter-sliders{display:flex;flex-direction:column;gap:11px;margin-bottom:14px}
.fs-row{display:flex;align-items:center;gap:8px}
.fs-name{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);width:52px;flex-shrink:0}
.fs-track{flex:1;height:3px;background:var(--dim);border-radius:2px;position:relative}
.fs-fill{position:absolute;left:0;top:0;height:100%;border-radius:2px;pointer-events:none}
.fs-input{position:absolute;inset:-8px 0;width:100%;opacity:0;cursor:pointer;height:20px;top:-9px}
.fs-val{font-family:var(--mono);font-size:11px;color:var(--slate);width:46px;text-align:right;flex-shrink:0}

.hr-filter-row{display:flex;align-items:center;gap:10px;padding-top:12px;border-top:1px solid var(--border)}
.toggle{position:relative;width:38px;height:20px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0;position:absolute}
.ttrack{position:absolute;inset:0;background:var(--dim);border-radius:20px;cursor:pointer;transition:background .2s}
.tthumb{position:absolute;left:3px;top:3px;width:14px;height:14px;border-radius:50%;background:#fff;transition:transform .2s;pointer-events:none}
.toggle input:checked~.ttrack{background:var(--red)}
.toggle input:checked~.tthumb{transform:translateX(18px)}
.hr-filter-label{font-size:13px;color:var(--muted);cursor:pointer;line-height:1.3}

/* STATUS */
.status-bar{display:flex;align-items:center;justify-content:space-between;padding:7px 18px;background:var(--bg);border-bottom:1px solid rgba(255,255,255,.03);flex-shrink:0}
.status-count{font-family:var(--mono);font-size:11px;color:var(--muted)}
.status-count strong{color:var(--slate)}
.hr-status{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:11px;color:var(--red)}
.hr-dot{width:5px;height:5px;border-radius:50%;background:var(--red)}

/* CARDS */
#cardsContainer{flex:1;overflow-y:auto;padding:10px 12px calc(var(--sb) + 72px);display:flex;flex-direction:column;gap:8px;-webkit-overflow-scrolling:touch}
.card{background:var(--surf);border:1px solid var(--border);border-radius:14px;padding:13px 14px;animation:fadeUp .18s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.card.hot{border-color:rgba(239,68,68,.22);background:linear-gradient(140deg,var(--surf) 55%,rgba(239,68,68,.06) 100%)}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px}
.card-left{display:flex;align-items:center;gap:9px;min-width:0}
.rank{font-family:var(--mono);font-size:11px;color:var(--muted);width:18px;text-align:right;flex-shrink:0}
.avatar{width:36px;height:36px;border-radius:10px;background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.12);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;letter-spacing:.01em;color:var(--blue2);flex-shrink:0}
.card.hot .avatar{background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.15);color:var(--red2)}
.player-info{min-width:0}
.player-name{font-size:16px;font-weight:700;letter-spacing:.02em;text-transform:uppercase;color:var(--text);line-height:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.player-meta{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:2px}
.hr-pill{font-size:18px;flex-shrink:0;line-height:1}

/* STAT BARS */
.stat-rows{display:flex;flex-direction:column;gap:7px}
.stat-row{display:flex;align-items:center;gap:8px}
.stat-name{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);width:50px;flex-shrink:0}
.stat-track{flex:1;height:3px;background:var(--dim);border-radius:2px;overflow:hidden}
.stat-fill{height:100%;border-radius:2px;transition:width .35s ease}
.stat-val{font-family:var(--mono);font-size:11px;color:var(--slate);text-align:right;width:44px;flex-shrink:0}


/* EMPTY */
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:60px 20px;text-align:center}
.empty-state i{font-size:36px;color:var(--dim)}
.empty-state p{font-size:14px;color:var(--muted);line-height:1.5}

/* TAB BAR */
.tab-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;display:flex;background:rgba(11,11,18,.95);border-top:1px solid var(--border);padding:8px 0 calc(var(--sb) + 6px);z-index:50;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;-webkit-tap-highlight-color:transparent;padding:2px 0}
.tab-icon{font-size:20px}
.tab-label{font-size:9px;letter-spacing:.07em;text-transform:uppercase}
.tab-item.active .tab-icon,.tab-item.active .tab-label{color:var(--blue)}
.tab-item:not(.active) .tab-icon,.tab-item:not(.active) .tab-label{color:var(--muted)}

/* LOADING BAR */
.loading-bar{height:2px;background:var(--blue);width:0;transition:width .4s ease;position:fixed;top:0;left:0;z-index:100}
.loading-bar.active{width:70%}
.loading-bar.done{width:100%;transition:width .2s ease}

/* TOAST */
.toast{position:fixed;bottom:calc(var(--sb) + 72px);left:50%;transform:translateX(-50%);background:rgba(30,30,46,.95);border:1px solid var(--border2);color:var(--slate);font-size:13px;padding:9px 16px;border-radius:99px;z-index:200;opacity:0;transition:opacity .25s;white-space:nowrap;pointer-events:none;backdrop-filter:blur(8px)}
.toast.show{opacity:1}
</style>
</head>
<body>
<div id="app">
  <div class="loading-bar" id="loadingBar"></div>

  <header>
    <div class="hdr-row">
      <div class="brand">
        <div class="brand-mark">⚾</div>
        <div class="brand-name">Bat <em>Tracker</em></div>
      </div>
      <button class="icon-btn" id="refreshBtn" onclick="fetchAll()" aria-label="Refresh data">
        <i class="ti ti-refresh" id="refreshIcon" aria-hidden="true"></i>
      </button>
    </div>
    <div class="date-row" id="datePills">
      <div class="date-pill" onclick="toggleDateEdit()">
        <i class="ti ti-calendar" aria-hidden="true"></i>
        <span id="pillStart">—</span>
      </div>
      <span class="date-sep">→</span>
      <div class="date-pill" onclick="toggleDateEdit()">
        <span id="pillEnd">—</span>
      </div>
      <div class="window-chip" id="windowChip">6d</div>
    </div>
    <div class="date-inputs" id="dateInputs">
      <input type="date" id="startDate" onchange="onDateChange()">
      <span class="date-sep">→</span>
      <input type="date" id="endDate" onchange="onDateChange()">
    </div>
  </header>

  <div class="filter-toggle" onclick="toggleFilters()">
    <span class="ftl">
      <i class="ti ti-adjustments-horizontal" aria-hidden="true"></i>
      Filters
      <span class="active-chip" id="activeChip"></span>
    </span>
    <div style="display:flex;align-items:center;gap:8px">
      <button onclick="event.stopPropagation();resetFilters()" style="font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);background:none;border:none;cursor:pointer;padding:2px 0;font-family:var(--font)" id="resetBtn" aria-label="Reset filters">Reset</button>
      <i class="ti ti-chevron-down fchev" id="filterChevron" aria-hidden="true"></i>
    </div>
  </div>

  <div class="filter-panel" id="filterPanel">
    <div class="filter-sliders">
      <div class="fs-row">
        <span class="fs-name">Bat Spd</span>
        <div class="fs-track">
          <div class="fs-fill" id="bsFill" style="background:var(--blue)"></div>
          <input class="fs-input" type="range" id="bsMin" min="65" max="85" step="0.5" value="65"
            oninput="onSlider('bs',this.value,'bsVal',65,80,'≥ ','',1)">
        </div>
        <span class="fs-val" id="bsVal">≥ 65.0</span>
      </div>
      <div class="fs-row">
        <span class="fs-name">Exit Velo</span>
        <div class="fs-track">
          <div class="fs-fill" id="evFill" style="background:var(--green)"></div>
          <input class="fs-input" type="range" id="evMin" min="75" max="105" step="0.5" value="75"
            oninput="onSlider('ev',this.value,'evVal',75,105,'≥ ','',1)">
        </div>
        <span class="fs-val" id="evVal">≥ 75.0</span>
      </div>
      <div class="fs-row">
        <span class="fs-name">Barrel%</span>
        <div class="fs-track">
          <div class="fs-fill" id="barrelFill" style="background:var(--red)"></div>
          <input class="fs-input" type="range" id="barrelMin" min="0" max="50" step="1" value="0"
            oninput="onSlider('barrel',this.value,'barrelVal',0,50,'≥ ','%',0)">
        </div>
        <span class="fs-val" id="barrelVal">≥ 0%</span>
      </div>
      <div class="fs-row">
        <span class="fs-name">Blast%</span>
        <div class="fs-track">
          <div class="fs-fill" id="blastFill" style="background:var(--amber)"></div>
          <input class="fs-input" type="range" id="blastMin" min="0" max="50" step="1" value="0"
            oninput="onSlider('blast',this.value,'blastVal',0,50,'≥ ','%',0)">
        </div>
        <span class="fs-val" id="blastVal">≥ 0%</span>
      </div>
      <div class="fs-row">
        <span class="fs-name">Pull%</span>
        <div class="fs-track">
          <div class="fs-fill" id="pullFill" style="width:100%;background:var(--purple)"></div>
          <input class="fs-input" type="range" id="pullMax" min="0" max="100" step="1" value="100"
            oninput="onSlider('pull',this.value,'pullVal',0,100,'≤ ','%',0)">
        </div>
        <span class="fs-val" id="pullVal">≤ 100%</span>
      </div>
    </div>
    <div class="hr-filter-row">
      <label class="toggle" for="hrOnly">
        <input type="checkbox" id="hrOnly" onchange="renderCards()">
        <div class="ttrack"></div>
        <div class="tthumb"></div>
      </label>
      <label class="hr-filter-label" for="hrOnly">HR in last 7 days only</label>
    </div>
  </div>

  <div class="status-bar">
    <span class="status-count" id="statusCount"><strong>—</strong> players</span>
    <span class="hr-status" id="hrStatus" style="display:none">
      <span class="hr-dot"></span>
      <span id="hrStatusText"></span>
    </span>
  </div>

  <div id="cardsContainer"></div>

  <nav class="tab-bar" aria-label="App navigation">
    <div class="tab-item active">
      <i class="ti ti-flame tab-icon" aria-hidden="true"></i>
      <span class="tab-label">Leaders</span>
    </div>
    <div class="tab-item" onclick="toggleFilters()">
      <i class="ti ti-adjustments tab-icon" aria-hidden="true"></i>
      <span class="tab-label">Filters</span>
    </div>
    <div class="tab-item" onclick="showToast('Trends coming soon')">
      <i class="ti ti-chart-line tab-icon" aria-hidden="true"></i>
      <span class="tab-label">Trends</span>
    </div>
  </nav>
</div>
<div class="toast" id="toast"></div>

<script>
const SAMPLE=[
  {name:'Nick Kurtz',team:'ATH',pos:'1B',batSpd:79.4,ev:96.5,barrel:37.5,blast:26.7,pull:12.5},
  {name:'Jordan Walker',team:'STL',pos:'OF',batSpd:78.7,ev:92.3,barrel:14.3,blast:22.2,pull:28.6},
  {name:'Jo Adell',team:'LAA',pos:'OF',batSpd:78.6,ev:96.9,barrel:20.0,blast:9.5,pull:20.0},
  {name:'Junior Caminero',team:'TBR',pos:'3B',batSpd:78.1,ev:91.1,barrel:9.1,blast:23.1,pull:54.5},
  {name:'Yordan Alvarez',team:'HOU',pos:'DH',batSpd:78.0,ev:94.2,barrel:16.7,blast:20.0,pull:16.7},
  {name:'Henry Bolte',team:'ATH',pos:'OF',batSpd:77.5,ev:93.9,barrel:0.0,blast:37.5,pull:27.3},
  {name:'Jorge Soler',team:'LAA',pos:'DH',batSpd:77.3,ev:93.3,barrel:0.0,blast:10.0,pull:100.0},
  {name:'Oneil Cruz',team:'PIT',pos:'SS',batSpd:77.1,ev:97.6,barrel:0.0,blast:25.0,pull:37.5},
  {name:'James Wood',team:'WSN',pos:'OF',batSpd:76.9,ev:100.1,barrel:22.2,blast:42.9,pull:11.1},
  {name:'Coby Mayo',team:'BAL',pos:'1B',batSpd:76.9,ev:97.5,barrel:14.3,blast:14.3,pull:71.4},
  {name:'Austin Riley',team:'ATL',pos:'3B',batSpd:76.8,ev:86.5,barrel:0.0,blast:11.5,pull:60.0},
  {name:'Zach Cole',team:'HOU',pos:'OF',batSpd:76.7,ev:93.2,barrel:30.0,blast:17.6,pull:30.0},
  {name:'Corbin Carroll',team:'ARI',pos:'OF',batSpd:76.5,ev:93.1,barrel:11.1,blast:21.4,pull:66.7},
  {name:'Munetaka Murakami',team:'CHW',pos:'1B',batSpd:76.4,ev:93.6,barrel:40.0,blast:31.3,pull:30.0},
  {name:'Kyle Schwarber',team:'PHI',pos:'DH',batSpd:76.3,ev:98.8,barrel:44.4,blast:25.0,pull:44.4},
  {name:'Tyler Soderstrom',team:'ATH',pos:'1B',batSpd:76.2,ev:92.3,barrel:10.0,blast:30.8,pull:40.0},
  {name:'Mike Trout',team:'LAA',pos:'OF',batSpd:76.1,ev:96.3,barrel:14.3,blast:12.5,pull:0.0},
  {name:'Gunnar Henderson',team:'BAL',pos:'SS',batSpd:76.0,ev:90.1,barrel:10.0,blast:16.7,pull:30.0},
  {name:'Fernando Tatis Jr.',team:'SDP',pos:'SS',batSpd:75.9,ev:88.1,barrel:9.1,blast:15.8,pull:45.5},
  {name:'Shea Langeliers',team:'ATH',pos:'C',batSpd:75.9,ev:92.5,barrel:7.1,blast:33.3,pull:21.4},
  {name:'Julio Rodríguez',team:'SEA',pos:'OF',batSpd:75.7,ev:90.7,barrel:0.0,blast:21.4,pull:41.7},
  {name:'Elly De La Cruz',team:'CIN',pos:'SS',batSpd:75.3,ev:95.3,barrel:15.4,blast:25.0,pull:23.1},
  {name:'Jake Burger',team:'TEX',pos:'1B',batSpd:75.3,ev:88.9,barrel:0.0,blast:0.0,pull:50.0},
  {name:'Brent Rooker',team:'ATH',pos:'DH',batSpd:75.2,ev:98.8,barrel:18.2,blast:33.3,pull:36.4},
  {name:'Matt Olson',team:'ATL',pos:'1B',batSpd:75.1,ev:92.2,barrel:0.0,blast:17.6,pull:33.3},
];
const SAMPLE_HRS={'Nick Kurtz':2,'Yordan Alvarez':2,'Kyle Schwarber':1,'Munetaka Murakami':2,'Brent Rooker':1,'James Wood':1,'Elly De La Cruz':1,'Coby Mayo':1};


let allPlayers=[],hrMap={},dateEditOpen=false,fetchCtl=null;
const pad=n=>String(n).padStart(2,'0');
const toYMD=d=>`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const addDays=(d,n)=>{const r=new Date(d);r.setDate(r.getDate()+n);return r};
const fmt=s=>{const d=new Date(s+'T12:00:00');return d.toLocaleDateString('en-US',{month:'short',day:'numeric'})};

function initDates(){
  const t=new Date();
  document.getElementById('startDate').value=toYMD(addDays(t,-5));
  document.getElementById('endDate').value=toYMD(t);
  updateDatePills();
}

function updateDatePills(){
  const s=document.getElementById('startDate').value;
  const e=document.getElementById('endDate').value;
  document.getElementById('pillStart').textContent=s?fmt(s):'—';
  document.getElementById('pillEnd').textContent=e?fmt(e):'—';
  if(s&&e){
    const days=Math.round((new Date(e)-new Date(s))/86400000)+1;
    document.getElementById('windowChip').textContent=days+'d';
  }
}

function toggleDateEdit(){
  dateEditOpen=!dateEditOpen;
  document.getElementById('datePills').style.display=dateEditOpen?'none':'flex';
  document.getElementById('dateInputs').classList.toggle('vis',dateEditOpen);
  if(!dateEditOpen)updateDatePills();
}

function onDateChange(){updateDatePills();fetchAll();}

function onSlider(key,val,labelId,min,max,prefix,suffix,decimals){
  const v=parseFloat(val);
  const pct=((v-min)/(max-min)*100).toFixed(1);
  document.getElementById(labelId).textContent=prefix+v.toFixed(decimals)+suffix;
  const fillId=key==='pull'?'pullFill':key==='barrel'?'barrelFill':key==='blast'?'blastFill':key+'Fill';
  const fill=document.getElementById(fillId);
  if(fill)fill.style.width=(key==='pull'?v:pct)+'%';
  renderCards();
}

function resetFilters(){
  document.getElementById('bsMin').value=65;
  document.getElementById('evMin').value=75;
  document.getElementById('barrelMin').value=0;
  document.getElementById('blastMin').value=0;
  document.getElementById('pullMax').value=100;
  document.getElementById('hrOnly').checked=false;
  document.getElementById('bsVal').textContent='≥ 65.0';
  document.getElementById('evVal').textContent='≥ 75.0';
  document.getElementById('barrelVal').textContent='≥ 0%';
  document.getElementById('blastVal').textContent='≥ 0%';
  document.getElementById('pullVal').textContent='≤ 100%';
  initSliderFills();
  renderCards();
}

function initSliderFills(){
  [['bs',65,80],['ev',75,105],['barrel',0,50],['blast',0,50]].forEach(([k,mn,mx])=>{
    const el=document.getElementById(k+'Min'),fill=document.getElementById(k+'Fill');
    if(el&&fill)fill.style.width=((parseFloat(el.value)-mn)/(mx-mn)*100).toFixed(1)+'%';
  });
  const p=document.getElementById('pullMax'),pf=document.getElementById('pullFill');
  if(p&&pf)pf.style.width=parseFloat(p.value)+'%';
}

function toggleFilters(){
  document.getElementById('filterPanel').classList.toggle('open');
  document.getElementById('filterChevron').classList.toggle('open');
}

function setLoading(on){
  const bar=document.getElementById('loadingBar'),icon=document.getElementById('refreshIcon');
  if(on){bar.className='loading-bar active';icon.className='ti ti-refresh spin';}
  else{bar.className='loading-bar done';icon.className='ti ti-refresh';setTimeout(()=>bar.className='loading-bar',300);}
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

function showBanner(msg){
  let b=document.getElementById('dataBanner');
  if(!b){
    b=document.createElement('div');
    b.id='dataBanner';
    b.style.cssText='background:rgba(245,158,11,.12);border-bottom:1px solid rgba(245,158,11,.25);color:#fcd34d;font-size:12px;font-family:var(--mono);padding:7px 18px;text-align:center;flex-shrink:0';
    document.getElementById('app').insertBefore(b,document.getElementById('cardsContainer'));
  }
  b.textContent='⚠ '+msg;
  b.style.display='block';
}

function hideBanner(){
  const b=document.getElementById('dataBanner');
  if(b)b.style.display='none';
}

function stripHTML(s){
  return s?s.replace(/<[^>]+>/g,'').trim():s;
}

function parsePct(v){
  if(typeof v==='number')return v>1?v:v*100;
  if(typeof v==='string')return parseFloat(v.replace('%',''));
  return 0;
}

async function fetchFanGraphs(start,end){
  // Call FanGraphs directly from the browser — no proxy needed
  const url=`https://www.fangraphs.com/api/leaders/major-league/data?age=&pos=all&stats=bat&lg=all&qual=1&season=2026&season1=2026&startdate=${start}&enddate=${end}&month=1000&hand=&team=0&pageitems=2000&pagenum=1&ind=0&rost=&players=&type=c,206,346,350,305,308&postseason=&sortdir=default&sortstat=c_206`;
  try{
    const r=await fetch(url,{signal:fetchCtl.signal,mode:'cors'});
    if(!r.ok)throw new Error('FanGraphs '+r.status);
    const j=await r.json();
    const data=j.data||j;
    if(Array.isArray(data)&&data.length)return data;
    throw new Error('empty');
  }catch(e){
    if(e.name==='AbortError')throw e;
    throw new Error('FanGraphs unreachable');
  }
}

async function fetchMLBHRs(){
  const t=new Date();
  const s=toYMD(addDays(t,-6));
  const e=toYMD(t);
  // Use the leaders endpoint — returns correct cumulative totals for a date range
  // Fetch a large pool (300) so we catch everyone with even 1 HR
  const url=`https://statsapi.mlb.com/api/v1/stats/leaders?leaderCategories=homeRuns&season=2026&gameType=R&playerPool=ALL&limit=300&statGroup=hitting&startDate=${s}&endDate=${e}`;
  const r=await fetch(url,{signal:fetchCtl.signal});
  if(!r.ok)throw new Error('MLB HR leaders API');
  const j=await r.json();
  const map={};
  (j.leagueLeaders||[]).forEach(cat=>{
    (cat.leaders||[]).forEach(row=>{
      const hrs=parseInt(row.value||0,10);
      if(hrs>0&&row.person?.fullName) map[row.person.fullName]=hrs;
    });
  });
  return map;
}



async function fetchAll(){
  if(fetchCtl)fetchCtl.abort();
  fetchCtl=new AbortController();
  const start=document.getElementById('startDate').value;
  const end=document.getElementById('endDate').value;
  if(!start||!end)return;
  setLoading(true);
  try{
    const[raw,hrs]=await Promise.allSettled([fetchFanGraphs(start,end),fetchMLBHRs()]);
    if(raw.status==='rejected'){showBanner('Live data unavailable — showing sample');loadSample();return;}
    hrMap=hrs.status==='fulfilled'?hrs.value:SAMPLE_HRS;
    const mapped=raw.value.map(p=>({
      name:stripHTML(p.PlayerName||p.Name||'—'),
      team:stripHTML(p.TeamNameAbb||p.Team||'—'),
      pos:p.Pos||p.position||'',
      batSpd:parseFloat(p['AvgBatSpeed']??0),
      ev:parseFloat(p['EV']??0),
      barrel:p['Barrel%']==null?null:parsePct(p['Barrel%']??0),
      blast:p['BlastContact%']==null?null:parsePct(p['BlastContact%']??0),
      pull:p['Pull%']==null?null:parsePct(p['Pull%']??0),
    })).filter(p=>p.batSpd>0);
    if(!mapped.length){showBanner('API returned no data — showing sample');loadSample();return;}
    hideBanner();
    allPlayers=mapped;
    renderCards();
  }catch(e){if(e.name!=='AbortError'){showBanner('Error fetching data — showing sample');loadSample();}}
  finally{setLoading(false);}
}

function loadSample(){allPlayers=SAMPLE;hrMap=SAMPLE_HRS;renderCards();}

function getHRs(name){
  if(hrMap[name]!==undefined)return hrMap[name];
  const nm=name.toLowerCase().replace(/[^a-z ]/g,'');
  for(const k of Object.keys(hrMap))if(k.toLowerCase().replace(/[^a-z ]/g,'')=== nm)return hrMap[k];
  return 0;
}

function initials(name){return name.split(' ').filter(Boolean).map(w=>w[0]).slice(0,2).join('').toUpperCase();}

function bar(val,min,max,color){
  if(val===null)return'<div class="stat-track"></div>';
  const pct=Math.min(100,Math.max(0,((val-min)/(max-min))*100));
  return `<div class="stat-track"><div class="stat-fill" style="width:${pct.toFixed(1)}%;background:${color}"></div></div>`;
}


function renderCards(){
  const bsMin=parseFloat(document.getElementById('bsMin').value);
  const evMin=parseFloat(document.getElementById('evMin').value);
  const barrelMin=parseFloat(document.getElementById('barrelMin').value);
  const blastMin=parseFloat(document.getElementById('blastMin').value);
  const pullMax=parseFloat(document.getElementById('pullMax').value);
  const hrOnly=document.getElementById('hrOnly').checked;

  let list=allPlayers.filter(p=>p.batSpd>=bsMin&&p.ev>=evMin&&(p.barrel??0)>=barrelMin&&(p.blast??0)>=blastMin&&(p.pull??100)<=pullMax);
  if(hrOnly)list=list.filter(p=>getHRs(p.name)>0);

  const active=[bsMin>65,evMin>75,barrelMin>0,blastMin>0,pullMax<100,hrOnly].filter(Boolean).length;
  const chip=document.getElementById('activeChip');
  chip.textContent=active+' active';chip.classList.toggle('show',active>0);

  document.getElementById('statusCount').innerHTML=`<strong>${list.length}</strong> player${list.length!==1?'s':''}`;
  const hrCount=list.filter(p=>getHRs(p.name)>0).length;
  const hrSt=document.getElementById('hrStatus');
  if(hrCount>0){hrSt.style.display='flex';document.getElementById('hrStatusText').textContent=`${hrCount} 🔥 last 7d`;}
  else hrSt.style.display='none';

  const C={batSpd:'var(--blue)',ev:'var(--green)',barrel:'var(--red)',blast:'var(--amber)',pull:'var(--purple)'};
  const container=document.getElementById('cardsContainer');

  if(!list.length){
    container.innerHTML='<div class="empty-state"><i class="ti ti-filter-off" aria-hidden="true"></i><p>No players match.<br>Try loosening the filters.</p></div>';
    return;
  }

  container.innerHTML=list.map((p,i)=>{
    const hrs=getHRs(p.name);
    const hot=hrs>0;
    const meta=[p.team,p.pos].filter(Boolean).join(' · ');
    return `
<div class="card${hot?' hot':''}" style="animation-delay:${Math.min(i*25,300)}ms">
  <div class="card-header">
    <div class="card-left">
      <span class="rank">${i+1}</span>
      <div class="avatar">${initials(p.name)}</div>
      <div class="player-info">
        <div class="player-name">${p.name}</div>
        <div class="player-meta">${meta}</div>
      </div>
    </div>
    ${hot?`<div class="hr-pill">🔥</div>`:''}
  </div>
  <div class="stat-rows">
    <div class="stat-row"><span class="stat-name">Bat Spd</span>${bar(p.batSpd,65,85,C.batSpd)}<span class="stat-val">${p.batSpd.toFixed(1)}</span></div>
    <div class="stat-row"><span class="stat-name">Exit Velo</span>${bar(p.ev,75,105,C.ev)}<span class="stat-val">${p.ev.toFixed(1)}</span></div>
    <div class="stat-row"><span class="stat-name">Barrel%</span>${bar(p.barrel,0,50,C.barrel)}<span class="stat-val">${p.barrel===null?'—':p.barrel.toFixed(1)+'%'}</span></div>
    <div class="stat-row"><span class="stat-name">Blast%</span>${bar(p.blast,0,50,C.blast)}<span class="stat-val">${p.blast===null?'—':p.blast.toFixed(1)+'%'}</span></div>
    <div class="stat-row"><span class="stat-name">Pull%</span>${bar(p.pull,0,100,C.pull)}<span class="stat-val">${p.pull===null?'—':p.pull.toFixed(1)+'%'}</span></div>
  </div>
</div>`;
  }).join('');
}

if('serviceWorker'in navigator)navigator.serviceWorker.register('/sw.js').catch(()=>{});

initDates();
initSliderFills();
fetchCtl=new AbortController();
loadSample();
setTimeout(fetchAll,150);
</script>
</body>
</html>
